<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1e40af">
<title>IT Service Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --brand:#1e3a8a;
  --brand-2:#2563eb;
  --brand-soft:#eff6ff;
  --accent:#10b981;
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#16a34a;
  --radius:14px;
  --shadow:0 1px 2px rgba(15,23,42,.06), 0 4px 12px rgba(15,23,42,.05);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:var(--font);color:var(--text);background:var(--bg);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--brand-2);text-decoration:none}
img{max-width:100%;display:block}

/* ===== Layout ===== */
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--brand);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.topbar .brand .logo{width:34px;height:34px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--brand);font-weight:800;overflow:hidden}
.topbar .brand .logo img{width:100%;height:100%;object-fit:contain}
.topbar .spacer{flex:1}
.topbar .icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12)}
.topbar .icon-btn:hover{background:rgba(255,255,255,.2)}
.topbar .icon-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}

.main{flex:1;max-width:1180px;width:100%;margin:0 auto;padding:16px;padding-bottom:96px}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 4px;z-index:40;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:10px;color:var(--muted);font-size:11px;font-weight:500;min-width:64px}
.bottomnav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
.bottomnav button.active{color:var(--brand-2)}
.bottomnav .fab{background:var(--brand-2);color:#fff;width:54px;height:54px;min-width:54px;max-width:54px;flex:0 0 54px;padding:0;border-radius:50%;margin-top:-22px;box-shadow:0 6px 14px rgba(37,99,235,.35);justify-content:center}
.bottomnav .fab svg{width:26px;height:26px;stroke-width:2.4}

/* ===== Cards / Forms ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.section-title{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--text);margin:0 0 14px 0;font-size:15px}
.section-title svg{width:18px;height:18px;stroke:var(--brand-2);fill:none;stroke-width:2}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.grid-2{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:13px;font-weight:500;color:#334155}
.field label .req{color:var(--danger)}
.input,.select,.textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;background:#fff;outline:none;transition:border-color .15s, box-shadow .15s}
.input:focus,.select:focus,.textarea:focus{border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.textarea{resize:vertical;min-height:80px}
.input[type=time],.input[type=date],.input[type=datetime-local]{appearance:none}
.input-icon{position:relative}
.input-icon svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;pointer-events:none}
.input-suffix{display:flex;align-items:center;gap:6px}
.input-suffix .input{flex:1}
.input-suffix .unit{color:var(--muted);font-size:13px}

.summary-pill{background:var(--brand-soft);color:var(--brand);font-weight:600;padding:10px 14px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:13px}
.summary-pill.green{background:#ecfdf5;color:#047857}
.summary-pill.purple{background:#f5f3ff;color:#6d28d9}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:transform .05s, background .15s, box-shadow .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--brand-2);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.25)}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:#f8fafc}
.btn-ghost{background:transparent;color:var(--brand-2)}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fee2e2}
.btn-block{width:100%}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

/* ===== Login ===== */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--brand) 0%,#0f172a 100%)}
.login-card{background:#fff;border-radius:18px;padding:34px;max-width:380px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.25)}
.login-logo{width:72px;height:72px;border-radius:18px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--brand);font-weight:800;font-size:28px;overflow:hidden}
.login-logo img{width:100%;height:100%;object-fit:contain}
.login h1{text-align:center;margin:0 0 6px;font-size:22px}
.login p{text-align:center;color:var(--muted);margin:0 0 24px;font-size:14px}
.role-pill{display:flex;gap:8px;margin-bottom:18px;background:#f1f5f9;padding:4px;border-radius:10px}
.role-pill button{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted)}
.role-pill button.active{background:#fff;color:var(--brand-2);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ===== Dashboard ===== */
.welcome{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 4px}
.welcome h2{margin:0;font-size:20px}
.welcome p{margin:2px 0 0;color:var(--muted);font-size:13px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.stat .n{font-size:22px;font-weight:700;color:var(--brand)}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}

.svc-card{background:#fff;border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;border:1px solid transparent;transition:border-color .15s, transform .1s}
.svc-card:hover{border-color:var(--brand-2)}
.svc-card:active{transform:scale(.99)}
.svc-card .row{display:flex;justify-content:space-between;align-items:center}
.svc-card .num{font-weight:700;color:var(--brand)}
.svc-card .name{font-size:15px;font-weight:600;margin-top:6px}
.svc-card .meta{color:var(--muted);font-size:13px;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.svc-card .meta svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.badge-new{background:#eff6ff;color:#1d4ed8}
.badge-progress{background:#fef3c7;color:#92400e}
.badge-done{background:#dcfce7;color:#166534}
.badge-pending{background:#fee2e2;color:#991b1b}
.badge-billed{background:#f3e8ff;color:#6b21a8}

/* ===== Wizard / Stepper ===== */
.stepper{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 4px 18px;position:relative}
.stepper::before{content:"";position:absolute;top:20px;left:8%;right:8%;height:2px;background:var(--border);z-index:0}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.step .bubble{width:34px;height:34px;border-radius:50%;background:#e5e7eb;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-weight:700;border:3px solid var(--bg);transition:all .2s}
.step.done .bubble{background:var(--ok);color:#fff}
.step.active .bubble{background:var(--brand-2);color:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.18)}
.step .lab{font-size:11px;color:var(--muted);font-weight:500;text-align:center}
.step.active .lab,.step.done .lab{color:var(--text)}

.wizard-header{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 6px;margin-bottom:6px}
.wizard-header .close{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#fff;box-shadow:var(--shadow)}
.wizard-header .close svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:2}
.wizard-header .title{font-weight:700;font-size:16px}
.wizard-header .save{font-weight:600;color:var(--brand-2);font-size:14px;padding:8px 10px}

.wizard-foot{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:14px;background:#fff;border-top:1px solid var(--border);z-index:60;max-width:1180px;margin:0 auto;box-shadow:0 -4px 14px rgba(0,0,0,.06)}
.wizard-foot .btn{flex:1}
.bottomnav.hide{display:none}

/* ===== Tasks / Materials list ===== */
.list-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.list-item .info{flex:1;min-width:0}
.list-item .title{font-weight:600;font-size:14px}
.list-item .sub{color:var(--muted);font-size:12px;margin-top:2px}
.list-item .del{color:var(--danger);padding:4px;border-radius:6px}
.list-item .del svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

.add-btn{width:100%;padding:13px;background:var(--brand-soft);color:var(--brand-2);border-radius:10px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;border:2px dashed rgba(37,99,235,.3)}
.add-btn:hover{background:#e0ecff}
.add-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}

/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:18px;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:600px){.modal-bg{align-items:center}.modal{border-radius:18px;max-height:88vh}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h3{margin:0;font-size:17px}
.modal-head .x{padding:6px;border-radius:50%}
.modal-head .x svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:2}

/* ===== Evidence / Photos ===== */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-tile{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:#f1f5f9;display:flex;align-items:center;justify-content:center}
.photo-tile img{width:100%;height:100%;object-fit:cover}
.photo-tile .rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.photo-add{border:2px dashed var(--border);color:var(--muted);cursor:pointer}
.photo-add svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2}

/* ===== Signature ===== */
.sig-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;padding:8px}
.sig-canvas{width:100%;height:180px;background:#fafafa;border-radius:8px;border:1px dashed var(--border);touch-action:none;cursor:crosshair;display:block}
.sig-actions{display:flex;gap:8px;margin-top:10px}
.sig-actions .btn{flex:1;font-size:13px;padding:9px}
.legal{background:#fffbeb;color:#78350f;border:1px solid #fde68a;border-radius:10px;padding:12px;font-size:12.5px;line-height:1.55;margin:12px 0}

/* ===== Admin ===== */
.tabs{display:flex;gap:6px;background:#fff;padding:6px;border-radius:12px;margin-bottom:14px;overflow-x:auto;box-shadow:var(--shadow)}
.tabs button{flex:1;min-width:max-content;padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;white-space:nowrap}
.tabs button.active{background:var(--brand-soft);color:var(--brand)}

.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.kv .k{color:var(--muted)}
.kv .v{font-weight:600}
.kv:last-child{border-bottom:0}

/* ===== PDF View ===== */
.pdf-toolbar{position:sticky;top:64px;background:#fff;padding:10px 14px;border-radius:10px;margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:30;box-shadow:var(--shadow)}
.pdf-page{background:#fff;max-width:880px;margin:0 auto;padding:30px;box-shadow:var(--shadow);border-radius:6px;font-size:11.5px;color:#0f172a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pdf-running-header{display:none}
.report-table{width:100%;border-collapse:collapse}
.report-table thead td,.report-table tbody td{padding:0;border:0;vertical-align:top}
.report-table thead .head{margin-bottom:10px}
.pdf-page *,.pdf-page *::before,.pdf-page *::after{-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pdf-page h2{background:var(--brand);color:#fff;padding:8px 12px;font-size:13px;margin:0 0 0;letter-spacing:.4px}
.pdf-page .head{border:2px solid var(--brand);background:#fff;padding:0}
.pdf-page .head-top{background:var(--brand);color:#fff;text-align:center;font-weight:700;font-size:14px;padding:8px}
.pdf-page .head-body{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;padding:14px;align-items:center}
.pdf-page .head-body .lg{width:60px;height:60px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px;overflow:hidden}
.pdf-page .head-body .lg img{width:100%;height:100%;object-fit:contain}
.pdf-page .head-body .num{text-align:center}
.pdf-page .head-body .num .l{font-size:10px;color:var(--muted)}
.pdf-page .head-body .num .v{font-weight:800;color:var(--brand);font-size:18px}
.pdf-page .meta-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;background:#f8fafc;padding:10px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:11px}
.pdf-page .meta-row .l{color:var(--muted);font-size:10px;display:block;margin-bottom:2px}
.pdf-page .meta-row .v{font-weight:600}
.pdf-page .sec{border:1px solid var(--border);margin-top:10px;border-radius:2px;overflow:hidden}
.pdf-page .sec-body{padding:10px 14px}
.pdf-page .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pdf-page table{width:100%;border-collapse:collapse;font-size:11px}
.pdf-page table th{background:#f1f5f9;text-align:left;padding:7px 8px;font-weight:600;font-size:10px;text-transform:uppercase;color:#475569}
.pdf-page table td{padding:7px 8px;border-bottom:1px solid #f1f5f9}
.pdf-page .pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.pdf-page .pill.ok{background:#dcfce7;color:#166534}
.pdf-page .pill.no{background:#fee2e2;color:#991b1b}
.pdf-page .pill.warn{background:#fef3c7;color:#92400e}
.pdf-page .sig-block{border:1px solid var(--border);border-radius:4px;padding:14px;text-align:center;margin-top:10px}
.pdf-page .sig-block img{max-height:60px;margin:0 auto 4px}
.pdf-page .sig-block .line{border-top:1px solid #334155;margin-top:6px;padding-top:4px;font-size:11px}
.pdf-page .photos-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pdf-page .photos-mini .ph{aspect-ratio:4/3;background:#e2e8f0;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:9px}
.pdf-page .photos-mini .ph img{width:100%;height:100%;object-fit:cover}
.pdf-page .foot{text-align:center;color:var(--muted);font-size:10px;margin-top:18px;padding-top:10px;border-top:1px solid var(--border)}
.pdf-page .stars{color:#f59e0b;letter-spacing:2px;font-size:14px}
.pdf-page .rating-pill{background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}

@media print{
  @page{
    margin:8mm 8mm 14mm 8mm;
    size:A4;
    @bottom-right{
      content:"Página " counter(page) " de " counter(pages);
      font-size:9px;
      color:#64748b;
      padding:0 4mm 2mm 0;
    }
    @bottom-left{
      content:"Reporte de Servicio IT";
      font-size:9px;
      color:#64748b;
      padding:0 0 2mm 4mm;
    }
  }
  *,*::before,*::after{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  html,body{background:#fff !important;margin:0 !important;padding:0 !important}
  .topbar,.bottomnav,.wizard-foot,.pdf-toolbar,.modal-bg,.toast,#view-login{display:none !important}
  .main{padding:0 !important;max-width:none !important;margin:0 !important}
  .main > *:not(.pdf-page){display:none !important}
  /* table-based repeating header (the only reliable cross-browser trick) */
  .report-table{width:100%;border-collapse:collapse}
  .report-table thead{display:table-header-group}
  .report-table tbody td,.report-table thead td{padding:0;border:0}
  .report-table thead .head{margin-bottom:6px}
  .pdf-page{box-shadow:none !important;padding:0 !important;max-width:none !important;margin:0 !important;border-radius:0 !important;font-size:9px !important;line-height:1.35 !important}
  .pdf-page h2{background:var(--brand) !important;color:#fff !important;padding:5px 9px !important;font-size:10px !important;margin-top:5px !important;page-break-after:avoid}
  .pdf-page .head{page-break-inside:avoid;margin-bottom:0 !important}
  .pdf-page .head-top{background:var(--brand) !important;color:#fff !important;padding:5px !important;font-size:11px !important}
  .pdf-page .head-body{padding:8px 12px !important}
  .pdf-page .head-body .lg{background:var(--brand) !important;color:#fff !important;width:48px !important;height:48px !important;font-size:18px !important}
  .pdf-page .head-body .num .v{font-size:15px !important}
  .pdf-page .meta-row{background:#f8fafc !important;padding:6px 12px !important;font-size:8.5px !important;gap:8px !important}
  .pdf-page .sec-body{padding:6px 10px !important}
  .pdf-page .sec{margin-top:0 !important;page-break-inside:avoid}
  .pdf-page .two{gap:10px !important}
  .pdf-page table th{background:#f1f5f9 !important;padding:4px 6px !important;font-size:8.5px !important}
  .pdf-page table td{padding:4px 6px !important;font-size:9px !important}
  .pdf-page .pill{padding:1px 6px !important;font-size:8.5px !important}
  .pdf-page .pill.ok{background:#dcfce7 !important;color:#166534 !important}
  .pdf-page .pill.no{background:#fee2e2 !important;color:#991b1b !important}
  .pdf-page .pill.warn{background:#fef3c7 !important;color:#92400e !important}
  .pdf-page .sig-block{padding:8px !important;page-break-inside:avoid}
  .pdf-page .sig-block img{max-height:42px !important}
  .pdf-page .photos-mini{gap:5px !important}
  .pdf-page .photos-mini .ph{background:#e2e8f0 !important;aspect-ratio:4/3}
  .pdf-page .foot{margin-top:10px !important;padding-top:6px !important;font-size:9px !important}
  .pdf-page img{max-width:100%;page-break-inside:avoid}
}

/* ===== Settings ===== */
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px}
.swatch{aspect-ratio:1;border-radius:10px;border:3px solid transparent;cursor:pointer;position:relative}
.swatch.selected{border-color:var(--text);box-shadow:0 0 0 2px #fff inset}
.logo-drop{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;color:var(--muted);cursor:pointer}
.logo-drop:hover{border-color:var(--brand-2);color:var(--brand-2)}
.logo-preview{width:80px;height:80px;border-radius:14px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:30px;margin:0 auto 10px;overflow:hidden}
.logo-preview img{width:100%;height:100%;object-fit:contain}

/* ===== Utility ===== */
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gap-8{gap:8px}.gap-12{gap:12px}
.mb-0{margin-bottom:0}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.text-muted{color:var(--muted)}
.text-sm{font-size:13px}
.hidden{display:none !important}

/* ===== Mobile responsive ===== */
@media(max-width:640px){
  html,body{font-size:14px}
  .topbar{padding:12px 14px}
  .topbar .brand{font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .brand .logo{width:30px;height:30px;flex-shrink:0}
  .topbar #top-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .icon-btn{width:34px;height:34px;flex-shrink:0}
  .main{padding:12px;padding-bottom:96px}
  .card{padding:14px;border-radius:12px}
  .btn{padding:11px 14px;font-size:14px}
  .stat{padding:12px}
  .stat .n{font-size:18px}
  .modal{max-width:100% !important;margin:12px !important;padding:16px !important;max-height:calc(100vh - 24px);overflow-y:auto}
  .modal-bg{padding:0 !important}
  .wizard-foot{padding:12px}
  .wizard-foot .btn{padding:12px 14px;font-size:14px}
  .pdf-page{max-width:100% !important;padding:12px !important;font-size:11px !important}
  .pdf-page .meta-row{grid-template-columns:repeat(2,1fr) !important;font-size:11px !important}
  .pdf-page .two{grid-template-columns:1fr !important}
  .pdf-page table{font-size:11px !important;display:block;overflow-x:auto;white-space:nowrap}
  .pdf-page .head-body{grid-template-columns:1fr !important;text-align:center;gap:10px}
  .pdf-page .photos-mini{grid-template-columns:repeat(2,1fr) !important}
}
/* Signature canvas fluid */
.sig-canvas{max-width:100%;width:100%;touch-action:none;background:#fff;border:1px solid var(--border);border-radius:10px}
/* Horizontal scroll wrapper for wide content */
.hscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .2s, transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>

<script>
/* ============================================================
   STATE & PERSISTENCE
   ============================================================ */
const STORAGE_KEY = 'it-service-app-v1';
const BRAND_KEY = 'it-service-brand-v1';

const defaultBrand = {
  name: 'Tu Empresa',
  tag: 'Soluciones de IT',
  logo: null, // base64
  brand: '#1e3a8a',
  brand2: '#2563eb',
  brandSoft: '#eff6ff',
};

const presetColors = [
  ['#1e3a8a','#2563eb','#eff6ff'],
  ['#0f766e','#14b8a6','#ecfdf5'],
  ['#7c2d12','#ea580c','#fff7ed'],
  ['#581c87','#9333ea','#faf5ff'],
  ['#0c4a6e','#0284c7','#f0f9ff'],
  ['#831843','#db2777','#fdf2f8'],
  ['#365314','#65a30d','#f7fee7'],
  ['#7f1d1d','#dc2626','#fef2f2'],
  ['#0f172a','#475569','#f8fafc'],
  ['#92400e','#d97706','#fffbeb'],
  ['#134e4a','#0d9488','#f0fdfa'],
  ['#1e1b4b','#4f46e5','#eef2ff'],
];

let brand = loadJSON(BRAND_KEY, defaultBrand);
let state = loadJSON(STORAGE_KEY, null) || initState();
// migrate old states without users
if(!state.users){
  state.users = [
    { id:'u1', name:'Super Admin', email:'admin@tuempresa.com', password:'admin', role:'super_admin', phone:'6000-0001', active:true },
    { id:'u2', name:'José Pérez', email:'jose.perez@tuempresa.com', password:'demo', role:'technician', phone:'6001-5678', active:true },
    { id:'u3', name:'Ana Rodríguez', email:'ana@tuempresa.com', password:'demo', role:'admin', phone:'6300-1100', active:true }
  ];
  saveJSON(STORAGE_KEY, state);
}
let session = { role:'technician', user:null, userObj:null };
let currentView = 'home';
let editingReport = null;
let wizardStep = 1;

function loadJSON(k, fallback){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
function saveJSON(k, v){ localStorage.setItem(k, JSON.stringify(v)); }
function saveState(){ saveJSON(STORAGE_KEY, state); cloud.pushAll(); }
function saveBrand(){ saveJSON(BRAND_KEY, brand); applyBrand(); }

/* ============================================================
   CLOUD SYNC (Supabase)
   ============================================================ */
const cloud = {
  client: null,
  online: false,
  pushTimer: null,
  lastSnapshot: { clients:'', reports:'', users:'' },
  init(){
    const cfg = window.APP_CONFIG;
    if(!cfg || !cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_URL.includes('YOUR-PROJECT')){
      console.warn('[cloud] Sin configuración de Supabase — usando modo local.');
      return;
    }
    try {
      this.client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
      this.online = true;
    } catch(e){ console.error('[cloud] init falló', e); }
  },
  async signIn(email, pass){
    if(!this.online) return { ok:false, error:'sin-cloud' };
    const { data, error } = await this.client.auth.signInWithPassword({ email, password: pass });
    if(error) return { ok:false, error: error.message };
    return { ok:true, user: data.user };
  },
  async signOut(){
    if(!this.online) return;
    try { await this.client.auth.signOut(); } catch(e){}
  },
  async currentSession(){
    if(!this.online) return null;
    const { data } = await this.client.auth.getSession();
    return data.session;
  },
  async loadProfile(userId){
    if(!this.online) return null;
    const { data, error } = await this.client.from('profiles').select('*').eq('id', userId).maybeSingle();
    if(error){ console.warn('[cloud] loadProfile', error.message); return null; }
    return data;
  },
  async pullAll(){
    if(!this.online) return;
    const [cRes, rRes, pRes] = await Promise.all([
      this.client.from('clients').select('*').order('name', {ascending:true}),
      this.client.from('reports').select('*').order('created_at', {ascending:false}),
      this.client.from('profiles').select('*').order('name', {ascending:true}),
    ]);
    if(!cRes.error) state.clients = (cRes.data||[]).map(row => ({ id: row.id, ...(row.data||{}) }));
    if(!rRes.error) state.reports = (rRes.data||[]).map(row => ({ id: row.id, ...(row.data||{}) }));
    if(!pRes.error) state.users = (pRes.data||[]).map(row => ({
      id: row.id, name: row.name, email: row.email, phone: row.phone,
      role: row.role, active: row.active !== false
    }));
    // snapshot to avoid re-pushing same data
    this.lastSnapshot.clients = JSON.stringify(state.clients);
    this.lastSnapshot.reports = JSON.stringify(state.reports);
    this.lastSnapshot.users = JSON.stringify(state.users);
    saveJSON(STORAGE_KEY, state);
  },
  pushAll(){
    if(!this.online || !session.userObj) return;
    clearTimeout(this.pushTimer);
    this.pushTimer = setTimeout(async () => {
      try {
        const clientsSnap = JSON.stringify(state.clients);
        const reportsSnap = JSON.stringify(state.reports);
        if(clientsSnap !== this.lastSnapshot.clients){
          const rows = state.clients.map(c => ({
            id: c.id, name: c.name || '', data: (({id,...rest})=>rest)(c)
          }));
          const { error } = await this.client.from('clients').upsert(rows, { onConflict:'id' });
          if(error){ console.warn('[cloud] upsert clients', error.message); toast('⚠️ Error al sincronizar clientes'); }
          else this.lastSnapshot.clients = clientsSnap;
        }
        if(reportsSnap !== this.lastSnapshot.reports){
          const rows = state.reports.map(r => ({
            id: r.id,
            number: r.number || r.id,
            client_id: r.clientId || null,
            status: r.status || 'NUEVO',
            date: r.date || null,
            technician_id: r.technicianId || session.userObj?.id || null,
            data: (({id,...rest})=>rest)(r)
          }));
          const { error } = await this.client.from('reports').upsert(rows, { onConflict:'id' });
          if(error){ console.warn('[cloud] upsert reports', error.message); toast('⚠️ Error al sincronizar reportes'); }
          else this.lastSnapshot.reports = reportsSnap;
        }
      } catch(e){ console.warn('[cloud] pushAll', e); }
    }, 600);
  },
  async deleteReport(id){
    if(!this.online) return;
    await this.client.from('reports').delete().eq('id', id);
  },
  async deleteClient(id){
    if(!this.online) return;
    await this.client.from('clients').delete().eq('id', id);
  },
  async upsertProfile(u){
    if(!this.online) return { ok:false };
    const row = {
      id: u.id, name: u.name, email: u.email, phone: u.phone||null,
      role: u.role, active: u.active !== false
    };
    const { error } = await this.client.from('profiles').upsert(row, { onConflict:'id' });
    return { ok: !error, error: error?.message };
  },
  async deleteProfile(id){
    if(!this.online) return;
    await this.client.from('profiles').delete().eq('id', id);
  }
};
cloud.init();

      { id:'c2', name:'Hotel Pacífico Azul', ruc:'7654321-1-123456 DV 22', email:'jorge.rios@pacifico.com', phone:'6122-4422', address:'Av. Balboa Edif. Mar, Piso 12', location:'Sede Centro', contact:'Jorge Ríos' },
      { id:'c3', name:'Distribuidora ELC', ruc:'9988776-2-554433 DV 05', email:'ventas@elcpanama.com', phone:'6789-1100', address:'Costa del Este, Torre Mar', location:'Almacén Principal', contact:'Lucía Méndez' },

/* ============================================================
   BRAND
   ============================================================ */
function applyBrand(){
  const r = document.documentElement.style;
  r.setProperty('--brand', brand.brand);
  r.setProperty('--brand-2', brand.brand2);
  r.setProperty('--brand-soft', brand.brandSoft);
  document.querySelector('meta[name=theme-color]').setAttribute('content', brand.brand);
  // logos
  const initials = (brand.name||'IT').split(/\s+/).map(s=>s[0]).slice(0,2).join('').toUpperCase();
  ['top-logo','login-logo','set-logo-prev'].forEach(id=>{
    const el = document.getElementById(id); if(!el) return;
    if(brand.logo){ el.innerHTML = `<img src="${brand.logo}" alt="logo">`; }
    else { el.innerHTML = initials; }
  });
  const tn = document.getElementById('top-name'); if(tn) tn.textContent = brand.name;
  const ln = document.getElementById('login-company'); if(ln) ln.textContent = brand.name;
}
applyBrand();

/* ============================================================
   UTIL
   ============================================================ */
function $(sel){ return document.querySelector(sel); }
function $$(sel){ return [...document.querySelectorAll(sel)]; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMin(min){
  if(!min || min<0) return '— —';
  const h = Math.floor(min/60), m = min%60;
  if(h===0) return `${m} min`;
  return `${String(h).padStart(2,'0')} h ${String(m).padStart(2,'0')} min`;
}
function fmtTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-PA',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function diffMinutes(start, end){
  if(!start || !end) return 0;
  const s = new Date(start), e = new Date(end);
  return Math.max(0, Math.round((e - s) / 60000));
}
function calculateTimes(t){
  if(!t) return {};
  const travelToClient = diffMinutes(t.departure_to_client_at, t.arrival_site_at);
  const workMinutes = diffMinutes(t.work_started_at, t.work_finished_at);
  const timeOnSite = diffMinutes(t.arrival_site_at, t.departure_site_at);
  const travelReturn = diffMinutes(t.departure_site_at, t.arrival_base_at);
  const totalTravel = travelToClient + travelReturn;
  const totalService = workMinutes + totalTravel;
  return {
    travel_to_client_minutes: travelToClient,
    work_minutes: workMinutes,
    time_on_site_minutes: timeOnSite,
    travel_return_minutes: travelReturn,
    total_travel_minutes: totalTravel,
    total_service_minutes: totalService
  };
}
function statusBadge(s){
  const map = {
    'NUEVO':['Nuevo','badge-new'],
    'ASIGNADO':['Asignado','badge-new'],
    'EN_CAMINO':['En camino','badge-progress'],
    'EN_SITIO':['En sitio','badge-progress'],
    'EN_PROCESO':['En proceso','badge-progress'],
    'PENDIENTE_CLIENTE':['Pendiente cliente','badge-pending'],
    'PENDIENTE_REPUESTO':['Pendiente repuesto','badge-pending'],
    'COMPLETADO_POR_TECNICO':['Completado','badge-done'],
    'FIRMADO_POR_CLIENTE':['Firmado','badge-done'],
    'EN_REVISION_ADMIN':['En revisión admin','badge-progress'],
    'APROBADO_PARA_FACTURAR':['Aprobado','badge-done'],
    'FACTURADO':['Facturado','badge-billed'],
    'CERRADO':['Cerrado','badge-done'],
    'CANCELADO':['Cancelado','badge-pending'],
  };
  const [lab, cls] = map[s] || [s,'badge-new'];
  return `<span class="badge ${cls}">${lab}</span>`;
}

async function completeLogin(userLike){
  session.userObj = userLike;
  session.user = userLike.name;
  session.role = userLike.role;
  $('#view-login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  if(cloud.online){
    toast('Sincronizando datos…');
    try { await cloud.pullAll(); } catch(e){ console.warn(e); }
  }
  if(userLike.role === 'admin' || userLike.role === 'super_admin'){ navigate('admin'); }
  else navigate('home');
}

$('#login-btn').addEventListener('click', async () => {
  const email = $('#login-email').value.trim().toLowerCase();
  const pass = $('#login-pass').value;
  const btn = $('#login-btn');
  btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Entrando…';

  if(cloud.online){
    const res = await cloud.signIn(email, pass);
    if(!res.ok){
      toast('Credenciales incorrectas');
      btn.disabled = false; btn.textContent = orig;
      return;
    }
    const profile = await cloud.loadProfile(res.user.id);
    if(!profile){
      toast('Cuenta sin perfil. Contacta al administrador.');
      await cloud.signOut();
      btn.disabled = false; btn.textContent = orig;
      return;
    }
    if(profile.active === false){
      toast('Usuario desactivado.');
      await cloud.signOut();
      btn.disabled = false; btn.textContent = orig;
      return;
    }
    btn.disabled = false; btn.textContent = orig;
    await completeLogin({
      id: profile.id, name: profile.name, email: profile.email,
      phone: profile.phone, role: profile.role, active: true
    });
    return;
  }

  // Modo local (sin Supabase configurado): usar users locales
  const user = state.users.find(u => u.email.toLowerCase() === email && u.password === pass && u.active);
  btn.disabled = false; btn.textContent = orig;
  if(!user){ toast('Credenciales incorrectas'); return; }
  await completeLogin(user);
});

$('#btn-logout').addEventListener('click', async () => {
  await cloud.signOut();
  session = { role:'technician', user:null, userObj:null };
  $('#view-login').classList.remove('hidden');
  $('#app').classList.add('hidden');
});
$('#login-customize').addEventListener('click', openSettings);

// Auto-login si Supabase ya tiene sesión activa
(async function tryResumeSession(){
  if(!cloud.online) return;
  const sess = await cloud.currentSession();
  if(!sess?.user) return;
  const profile = await cloud.loadProfile(sess.user.id);
  if(!profile || profile.active === false) return;
  await completeLogin({
    id: profile.id, name: profile.name, email: profile.email,
    phone: profile.phone, role: profile.role, active: true
  });
})();

      ${STEPS.map((s,i)=>{
        const n=i+1; const cls = n<wizardStep?'done':(n===wizardStep?'active':'');
        return `<div class="step ${cls}"><div class="bubble">${n}</div><div class="lab">${s}</div></div>`;
      }).join('')}
    </div>
    <div id="wizard-body">${wizardBody()}</div>
    <div class="wizard-foot">
      ${wizardStep>1 ? '<button class="btn btn-outline" id="wizard-prev">Anterior</button>' : ''}
      <button class="btn btn-primary" id="wizard-next">${wizardStep===5?'Finalizar':'Siguiente'}</button>
    </div>
  `;
}

function wizardBody(){
  const r = editingReport;
  if(wizardStep===1) return wizStepCliente(r);
  if(wizardStep===2) return wizStepDetalle(r);
  if(wizardStep===3) return wizStepTrabajo(r);
  if(wizardStep===4) return wizStepEvidencias(r);
  if(wizardStep===5) return wizStepFirma(r);
}

/* ============================================================
   Wizard handlers
   ============================================================ */
function attachHandlers(){
  // open detail card
  $$('[data-open]').forEach(el => el.addEventListener('click', ()=>{
    const r = state.reports.find(x=>x.id===el.dataset.open);
    if(!r) return;
    editingReport = r;
    if(session.role==='admin') openAdminReview(r);
    else navigate('detail');
  }));
  $$('[data-nav-go]').forEach(el => el.addEventListener('click',()=>navigate(el.dataset.navGo)));
  $('#wizard-close')?.addEventListener('click', () => {
    if(confirm('¿Salir sin guardar?')) navigate('home');
  });
  $('#wizard-save')?.addEventListener('click', () => saveWizardReport(false));
  $('#wizard-prev')?.addEventListener('click', () => { wizardStep--; navigate('wizard'); });
  $('#wizard-next')?.addEventListener('click', () => {
    if(!validateStep()) return;
    if(wizardStep<5){ wizardStep++; navigate('wizard'); }
    else { finishWizard(); }
  });

  // 2-way binding
  $$('[data-bind]').forEach(el => {
    el.addEventListener('input', () => {
      const path = el.dataset.bind.split('.');
      let obj = editingReport;
      for(let i=0;i<path.length-1;i++){ if(!obj[path[i]]) obj[path[i]]={}; obj=obj[path[i]]; }
      let v = el.value;
      if(el.type==='number') v = Number(v||0);
      obj[path[path.length-1]] = v;
      // refresh time summary in step 3
      if(wizardStep===3 && el.dataset.bind.startsWith('times')){
        const sums = $$('.summary-pill');
        const c = calculateTimes(editingReport.times);
        // we re-render this step for simplicity
        $('#wizard-body').innerHTML = wizardBody();
        attachWizardSubHandlers();
      }
      if(wizardStep===1 && el.dataset.bind==='clientId'){
        $('#wizard-body').innerHTML = wizardBody();
        attachWizardSubHandlers();
      }
    });
  });

  attachWizardSubHandlers();

  // Add task / material / client
  $('#add-task')?.addEventListener('click', () => openTaskModal());
  $('#add-mat')?.addEventListener('click', () => openMatModal());
  $('#add-client')?.addEventListener('click', () => openClientModal());
  $('#new-client-btn')?.addEventListener('click', () => openClientModal());
  $$('[data-edit-client]').forEach(b => b.addEventListener('click',()=>{
    const c = state.clients.find(x=>x.id===b.dataset.editClient);
    if(c) openClientModal(c);
  }));
  $$('[data-del-client]').forEach(b => b.addEventListener('click', async ()=>{
    if(!confirm('¿Borrar este cliente?')) return;
    const id = b.dataset.delClient;
    state.clients = state.clients.filter(x=>x.id!==id);
    await cloud.deleteClient(id);
    saveState(); navigate('clients'); toast('Cliente borrado');
  }));
  // Users
  $('#new-user-btn')?.addEventListener('click', () => openUserModal());
  $$('[data-edit-user]').forEach(b => b.addEventListener('click',()=>{
    const u = state.users.find(x=>x.id===b.dataset.editUser);
    if(u) openUserModal(u);
  }));
  $$('[data-del-user]').forEach(b => b.addEventListener('click', async ()=>{
    if(!confirm('¿Borrar este usuario? (Su cuenta de acceso seguirá existiendo hasta que un admin la elimine desde Supabase)')) return;
    const id = b.dataset.delUser;
    state.users = state.users.filter(x=>x.id!==id);
    await cloud.deleteProfile(id);
    saveState(); navigate('users'); toast('Usuario borrado');
  }));
  $$('[data-del-task]').forEach(b => b.addEventListener('click',()=>{
    editingReport.tasks = editingReport.tasks.filter(t=>t.id!==b.dataset.delTask);
    $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers();
  }));
  $$('[data-del-mat]').forEach(b => b.addEventListener('click',()=>{
    editingReport.materials = editingReport.materials.filter(m=>m.id!==b.dataset.delMat);
    $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers();
  }));
  $$('[data-del-photo]').forEach(b => b.addEventListener('click',()=>{
    editingReport.photos.splice(+b.dataset.delPhoto,1);
    $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers();
  }));
  $('#photo-input')?.addEventListener('change', e => {
    [...e.target.files].forEach(file => {
      const r = new FileReader();
      r.onload = ev => { editingReport.photos.push(ev.target.result); $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers(); };
      r.readAsDataURL(file);
    });
  });

  // Detail view tabs
  $$('[data-tab]').forEach(b => b.addEventListener('click', () => {
    $$('[data-tab]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const r = editingReport; const c = getClient(r.clientId); const t = calculateTimes(r.times||{});
    if(b.dataset.tab==='resumen') $('#detail-tab').innerHTML = detailResumen(r,c,t);
    else if(b.dataset.tab==='tareas') $('#detail-tab').innerHTML = detailTasks(r);
    else if(b.dataset.tab==='mat') $('#detail-tab').innerHTML = detailMats(r);
    else if(b.dataset.tab==='evi') $('#detail-tab').innerHTML = detailEvi(r);
  }));
  $$('[data-edit-report]').forEach(b => b.addEventListener('click', ()=> editReport(editingReport)));
  $$('[data-action="continue"]').forEach(b => b.addEventListener('click', ()=>{
    if(editingReport.status==='EN_REVISION_ADMIN' || editingReport.status==='APROBADO_PARA_FACTURAR' || editingReport.status==='FACTURADO'){
      navigate('pdf');
    } else editReport(editingReport);
  }));

  // Services list filter
  $$('[data-flt]').forEach(b => b.addEventListener('click', ()=>{
    $$('[data-flt]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const f = b.dataset.flt;
    let list = state.reports;
    if(f==='active') list = list.filter(r=>['EN_CAMINO','EN_SITIO','EN_PROCESO','ASIGNADO','NUEVO'].includes(r.status));
    if(f==='done') list = list.filter(r=>['COMPLETADO_POR_TECNICO','FIRMADO_POR_CLIENTE','EN_REVISION_ADMIN','APROBADO_PARA_FACTURAR','FACTURADO','CERRADO'].includes(r.status));
    $('#svc-list').innerHTML = list.map(r=>svcCard(r)).join('') || '<div class="card text-muted">Sin servicios.</div>';
    $$('[data-open]').forEach(el => el.addEventListener('click', ()=>{
      const r = state.reports.find(x=>x.id===el.dataset.open); if(!r) return;
      editingReport = r; navigate('detail');
    }));
  }));

  // Admin
  $$('[data-admin-open]').forEach(b => b.addEventListener('click', ()=>{
    const r = state.reports.find(x=>x.id===b.dataset.adminOpen);
    editingReport = r; openAdminReview(r);
  }));
  $$('[data-pdf-open]').forEach(b => b.addEventListener('click', ()=>{
    const r = state.reports.find(x=>x.id===b.dataset.pdfOpen);
    editingReport = r; navigate('pdf');
  }));

  // PDF actions
  $('#pdf-print')?.addEventListener('click', ()=>{
    const original = document.title;
    document.title = `Reporte ${editingReport.number} - ${getClient(editingReport.clientId).name||''}`;
    window.print();
    setTimeout(()=>{ document.title = original; }, 1000);
  });
  $('#pdf-send')?.addEventListener('click', ()=>{
    editingReport.status = 'EN_REVISION_ADMIN';
    const i = state.reports.findIndex(r=>r.id===editingReport.id);
    if(i>=0) state.reports[i] = editingReport;
    saveState();
    toast('Reporte enviado al cliente y a administración');
  });
  $('#pdf-back')?.addEventListener('click', ()=>navigate(session.role==='admin'?'admin':'detail'));

  // Profile buttons
  $('#btn-set-from-profile')?.addEventListener('click', openSettings);
  $('#btn-export')?.addEventListener('click', () => {
    const blob = new Blob([JSON.stringify({ state, brand }, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `it-service-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Backup descargado');
  });
  $('#btn-import')?.addEventListener('change', e => {
    const f = e.target.files[0]; if(!f) return;
    if(!confirm('Esto reemplazará todos los datos actuales. ¿Continuar?')) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const obj = JSON.parse(ev.target.result);
        if(obj.state){ state = obj.state; saveState(); }
        if(obj.brand){ brand = obj.brand; saveBrand(); }
        toast('Datos importados'); navigate('profile');
      } catch(err){ toast('Archivo inválido'); }
    };
    r.readAsText(f);
  });
  $('#btn-reset')?.addEventListener('click', () => {
    if(!confirm('Esto borrará TODOS los clientes y reportes. Esta acción no se puede deshacer. ¿Continuar?')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = initState(); saveState();
    toast('Datos restablecidos'); navigate('home');
  });
}

function attachWizardSubHandlers(){
  // client signature
  const cv = document.getElementById('sig-canvas');
  if(cv) initSignaturePad(cv, 'signature');
  $('#sig-clear')?.addEventListener('click', ()=>{
    const c = document.getElementById('sig-canvas');
    c.getContext('2d').clearRect(0,0,c.width,c.height);
    editingReport.signature = null;
  });
  $('#sig-save')?.addEventListener('click', ()=>{
    const c = document.getElementById('sig-canvas');
    editingReport.signature = c.toDataURL('image/png');
    if(!editingReport.signer.date) editingReport.signer.date = new Date().toISOString().slice(0,16);
    toast('Firma del cliente guardada');
    $('#wizard-body').innerHTML = wizardBody();
    attachWizardSubHandlers();
  });
  // technician signature
  const cvT = document.getElementById('sig-canvas-tech');
  if(cvT) initSignaturePad(cvT, 'signatureTech');
  $('#sig-tech-clear')?.addEventListener('click', ()=>{
    const c = document.getElementById('sig-canvas-tech');
    c.getContext('2d').clearRect(0,0,c.width,c.height);
    editingReport.signatureTech = null;
  });
  $('#sig-tech-save')?.addEventListener('click', ()=>{
    const c = document.getElementById('sig-canvas-tech');
    editingReport.signatureTech = c.toDataURL('image/png');
    toast('Firma del técnico guardada');
    $('#wizard-body').innerHTML = wizardBody();
    attachWizardSubHandlers();
  });
  $('#add-task')?.addEventListener('click', openTaskModal);
  $('#add-mat')?.addEventListener('click', openMatModal);
  $('#add-client')?.addEventListener('click', () => openClientModal());
  $$('[data-del-task]').forEach(b => b.addEventListener('click',()=>{
    editingReport.tasks = editingReport.tasks.filter(t=>t.id!==b.dataset.delTask);
    $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers();
  }));
  $$('[data-del-mat]').forEach(b => b.addEventListener('click',()=>{
    editingReport.materials = editingReport.materials.filter(m=>m.id!==b.dataset.delMat);
    $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers();
  }));
  $$('[data-del-photo]').forEach(b => b.addEventListener('click',()=>{
    editingReport.photos.splice(+b.dataset.delPhoto,1);
    $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers();
  }));
  $('#photo-input')?.addEventListener('change', e => {
    [...e.target.files].forEach(file => {
      const r = new FileReader();
      r.onload = ev => { editingReport.photos.push(ev.target.result); $('#wizard-body').innerHTML = wizardBody(); attachWizardSubHandlers(); };
      r.readAsDataURL(file);
    });
  });
  // re-bind inputs in new content
  $$('#wizard-body [data-bind]').forEach(el => {
    el.addEventListener('input', () => {
      const path = el.dataset.bind.split('.');
      let obj = editingReport;
      for(let i=0;i<path.length-1;i++){ if(!obj[path[i]]) obj[path[i]]={}; obj=obj[path[i]]; }
      let v = el.value;
      if(el.type==='number') v = Number(v||0);
      obj[path[path.length-1]] = v;
      if(wizardStep===3 && el.dataset.bind.startsWith('times')){
        $('#wizard-body').innerHTML = wizardBody();
        attachWizardSubHandlers();
      }
    });
  });
}

/* ============================================================
   Validation & save
   ============================================================ */
function validateStep(){
  const r = editingReport;
  if(wizardStep===1){
    if(!r.clientId){ toast('Selecciona un cliente'); return false; }
    if(!r.problem || r.problem.trim().length<5){ toast('Describe el motivo del servicio'); return false; }
  }
  if(wizardStep===2){
    if(!r.diagnosis || r.diagnosis.trim().length<5){ toast('Agrega el diagnóstico'); return false; }
  }
  if(wizardStep===3){
    const t = r.times||{};
    if(!t.work_started_at || !t.work_finished_at){ toast('Completa inicio y fin de trabajo'); return false; }
  }
  if(wizardStep===5){
    if(!r.signer?.name){ toast('Falta nombre de quien aprueba'); return false; }
    if(!r.signer?.email){ toast('Falta correo del cliente'); return false; }
    if(!r.signature){ toast('El cliente debe firmar'); return false; }
    if(!r.signatureTech){ toast('Falta firma del técnico'); return false; }
  }
  return true;
}

function saveWizardReport(silent){
  if(editingReport.isNew){
    delete editingReport.isNew;
    editingReport.id = editingReport.number;
    state.reports.unshift(editingReport);
  } else {
    const i = state.reports.findIndex(r=>r.id===editingReport.id);
    if(i>=0) state.reports[i] = editingReport;
  }
  saveState();
  if(!silent) toast('Guardado');
}

function finishWizard(){
  editingReport.status = 'FIRMADO_POR_CLIENTE';
  saveWizardReport(true);
  toast('Reporte completado y firmado');
  navigate('pdf');
}

          role: $('#us-role').value,
          active: $('#us-active').checked

        closeModal();
        toast('Usuario actualizado');
        if(currentView==='users') navigate('users');

        phone: $('#us-phone').value.trim(),

      } else {
        state.users.push(data);

      saveState();
      btn.disabled = false; btn.textContent = orig;
      closeModal();
      toast(isEdit?'Usuario actualizado':'Usuario creado');
      if(currentView==='users') navigate('users');
    });
  });

/* ============================================================
   Signature pad
   ============================================================ */
function initSignaturePad(canvas, fieldKey){
  const ctx = canvas.getContext('2d');
  function resize(){
    const dpr = window.devicePixelRatio||1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width*dpr;
    canvas.height = rect.height*dpr;
    ctx.scale(dpr,dpr);
    ctx.lineWidth = 2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle = '#0f172a';
    const existing = fieldKey ? editingReport[fieldKey] : editingReport.signature;
    if(existing){
      const img = new Image();
      img.onload = ()=>{
        ctx.drawImage(img, 0, 0, rect.width, rect.height);
      };
      img.src = existing;
    }
  }
  resize();
  let drawing=false, lx=0, ly=0;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX-rect.left, t.clientY-rect.top];
  }
  function start(e){ e.preventDefault(); drawing=true; [lx,ly]=pos(e); }
  function move(e){ if(!drawing) return; e.preventDefault(); const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke(); [lx,ly]=[x,y]; }
  function end(e){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end); canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
}

function openAdminReview(r){
  const c = getClient(r.clientId);
  const t = calculateTimes(r.times||{});
  const a = r.admin || { laborRate:25, travelRate:15, expenses:0, billingType:'Mano de obra + materiales', discount:0 };
  const billableMatTotal = (r.materials||[]).filter(m=>m.billable).reduce((s,m)=> s + (m.qty * (m.unitPrice||0)), 0);
  const workHours = (t.work_minutes||0)/60;
  const travelHours = (t.total_travel_minutes||0)/60;
  const labor = workHours * a.laborRate;
  const travel = travelHours * a.travelRate;
  const materials = a.materials != null ? a.materials : billableMatTotal;
  const expenses = a.expenses||0;
  const subtotal = labor + travel + materials + expenses;
  const tax = subtotal * 0.07;
  const total = subtotal + tax - (a.discount||0);

  const html = `
    <div class="modal-head"><h3>Revisión administrativa · ${esc(r.number)}</h3><button class="x" data-close><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="kv"><span class="k">Cliente</span><span class="v">${esc(c.name)}</span></div>
    <div class="kv"><span class="k">Técnico</span><span class="v">${esc(r.technician)}</span></div>
    <div class="kv"><span class="k">Trabajo</span><span class="v">${fmtMin(t.work_minutes)}</span></div>
    <div class="kv"><span class="k">Traslado</span><span class="v">${fmtMin(t.total_travel_minutes)}</span></div>
    <h4 style="margin:16px 0 8px;font-size:14px">Tipo de facturación</h4>
    <div class="field"><select class="select" id="ad-btype">
      ${['Por hora','Tarifa fija','Mano de obra + materiales','Materiales solamente','Incluido en contrato','Garantía','No facturable','Requiere cotización'].map(o=>`<option ${a.billingType===o?'selected':''}>${o}</option>`).join('')}
    </select></div>
    <div class="grid-2">
      <div class="field"><label>Tarifa hora trabajo</label><div class="input-suffix"><span class="unit">B/.</span><input class="input" type="number" id="ad-lrate" value="${a.laborRate}"></div></div>
      <div class="field"><label>Tarifa hora traslado</label><div class="input-suffix"><span class="unit">B/.</span><input class="input" type="number" id="ad-trate" value="${a.travelRate}"></div></div>
      <div class="field"><label>Materiales</label><div class="input-suffix"><span class="unit">B/.</span><input class="input" type="number" id="ad-mat" value="${materials.toFixed(2)}"></div></div>
      <div class="field"><label>Viáticos</label><div class="input-suffix"><span class="unit">B/.</span><input class="input" type="number" id="ad-exp" value="${expenses}"></div></div>
      <div class="field"><label>Descuento</label><div class="input-suffix"><span class="unit">B/.</span><input class="input" type="number" id="ad-disc" value="${a.discount||0}"></div></div>
      <div class="field"><label>N° Factura</label><input class="input" id="ad-inv" value="${esc(a.invoiceNumber||'')}"></div>
    </div>
    <div class="card" style="background:#f8fafc;box-shadow:none;padding:12px;margin:0 0 12px">
      <div class="kv"><span class="k">Mano de obra (${workHours.toFixed(2)}h)</span><span class="v" id="ad-labor">B/. ${labor.toFixed(2)}</span></div>
      <div class="kv"><span class="k">Traslado (${travelHours.toFixed(2)}h)</span><span class="v" id="ad-travel">B/. ${travel.toFixed(2)}</span></div>
      <div class="kv"><span class="k">Materiales</span><span class="v" id="ad-mats">B/. ${materials.toFixed(2)}</span></div>
      <div class="kv"><span class="k">Viáticos</span><span class="v" id="ad-exps">B/. ${expenses.toFixed(2)}</span></div>
      <div class="kv"><span class="k">ITBMS (7%)</span><span class="v" id="ad-tax">B/. ${tax.toFixed(2)}</span></div>
      <div class="kv"><span class="k" style="font-weight:700">TOTAL</span><span class="v" style="color:var(--brand);font-size:18px" id="ad-total">B/. ${total.toFixed(2)}</span></div>
    </div>
    <div class="field"><label>Comentarios internos</label><textarea class="textarea" id="ad-notes">${esc(a.notes||'')}</textarea></div>
    <div class="flex gap-8">
      <button class="btn btn-outline" id="ad-reject" style="flex:1">Rechazar</button>
      <button class="btn btn-primary" id="ad-approve" style="flex:1">Aprobar para facturar</button>
    </div>
    <button class="btn btn-ghost btn-block mt-8" id="ad-mark-billed">Marcar como facturado</button>
  `;
  openModal(html, () => {
    function recompute(){
      const lr = +$('#ad-lrate').value||0;
      const tr = +$('#ad-trate').value||0;
      const m = +$('#ad-mat').value||0;
      const e = +$('#ad-exp').value||0;
      const d = +$('#ad-disc').value||0;
      const lb = workHours*lr, tv = travelHours*tr;
      const st = lb+tv+m+e; const tx = st*0.07; const to = st+tx-d;
      $('#ad-labor').textContent = 'B/. '+lb.toFixed(2);
      $('#ad-travel').textContent = 'B/. '+tv.toFixed(2);
      $('#ad-mats').textContent = 'B/. '+m.toFixed(2);
      $('#ad-exps').textContent = 'B/. '+e.toFixed(2);
      $('#ad-tax').textContent = 'B/. '+tx.toFixed(2);
      $('#ad-total').textContent = 'B/. '+to.toFixed(2);
    }
    ['ad-lrate','ad-trate','ad-mat','ad-exp','ad-disc'].forEach(id => $('#'+id).addEventListener('input', recompute));
    function gather(){
      return {
        billingType: $('#ad-btype').value,
        laborRate: +$('#ad-lrate').value||0,
        travelRate: +$('#ad-trate').value||0,
        materials: +$('#ad-mat').value||0,
        expenses: +$('#ad-exp').value||0,
        discount: +$('#ad-disc').value||0,
        invoiceNumber: $('#ad-inv').value,
        notes: $('#ad-notes').value,
        reviewedBy: session.user
      };
    }
    $('#ad-approve').addEventListener('click', ()=>{
      r.admin = { ...gather(), approved:true };
      r.status = 'APROBADO_PARA_FACTURAR';
      saveState(); closeModal(); navigate('admin'); toast('Aprobado para facturar');
    });
    $('#ad-reject').addEventListener('click', ()=>{
      r.admin = { ...gather(), approved:false };
      r.status = 'EN_REVISION_ADMIN';
      saveState(); closeModal(); navigate('admin'); toast('Reporte devuelto al técnico');
    });
    $('#ad-mark-billed').addEventListener('click', ()=>{
      r.admin = { ...gather(), approved:true };
      r.status = 'FACTURADO';
      saveState(); closeModal(); navigate('admin'); toast('Marcado como facturado');
    });
  });
}

              <div>Materiales: <strong>B/. ${m.toFixed(2)}</strong></div>
              <div>Viáticos: <strong>B/. ${e.toFixed(2)}</strong></div>
              <div>ITBMS (7%): <strong>B/. ${tx.toFixed(2)}</strong></div>
              <div style="color:var(--brand);font-weight:700;font-size:14px">TOTAL: B/. ${to.toFixed(2)}</div>
              <div style="margin-top:6px">N° Factura: <strong>${esc(r.admin.invoiceNumber||'—')}</strong></div>
              `;
            })()}
          </div>
        </div>
      `:''}

      <div class="foot">
        Gracias por confiar en nuestros servicios. · ${esc(brand.name)} · www.${(brand.name||'tuempresa').toLowerCase().replace(/[^a-z0-9]/g,'')}.com
      </div>
       </td></tr>
      </tbody>
     </table>
    </div>
  `;
}

/* ============================================================
   SETTINGS
   ============================================================ */
$('#btn-settings').addEventListener('click', openSettings);

function openSettings(){
  $('#set-name').value = brand.name;
  $('#set-tag').value = brand.tag;
  $('#set-color-custom').value = brand.brand;
  // colors grid
  const grid = $('#set-colors');
  grid.innerHTML = presetColors.map((c,i)=>`<div class="swatch ${c[0]===brand.brand?'selected':''}" data-i="${i}" style="background:linear-gradient(135deg,${c[0]} 0%,${c[1]} 100%)"></div>`).join('');
  $$('#set-colors .swatch').forEach(s => s.addEventListener('click', ()=>{
    $$('#set-colors .swatch').forEach(x=>x.classList.remove('selected'));
    s.classList.add('selected');
    const c = presetColors[+s.dataset.i];
    brand.brand = c[0]; brand.brand2 = c[1]; brand.brandSoft = c[2];
    applyBrand();
  }));
  $('#set-color-custom').addEventListener('input', () => {
    brand.brand = $('#set-color-custom').value;
    // derive
    brand.brand2 = brand.brand;
    brand.brandSoft = brand.brand + '20';
    applyBrand();
    $$('#set-colors .swatch').forEach(x=>x.classList.remove('selected'));
  });
  $('#set-logo-btn').onclick = () => $('#set-logo-file').click();
  $('#set-logo-rm').onclick = () => { brand.logo = null; applyBrand(); };
  $('#set-logo-file').onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => { brand.logo = ev.target.result; applyBrand(); };
    r.readAsDataURL(f);
  };
  $('#set-save').onclick = () => {
    brand.name = $('#set-name').value || 'Tu Empresa';
    brand.tag = $('#set-tag').value || 'Soluciones de IT';
    saveBrand();
    closeSettings(); toast('Personalización guardada');
  };
  $('#modal-settings').classList.add('open');
  $$('#modal-settings [data-close]').forEach(b => b.addEventListener('click', closeSettings));
}
function closeSettings(){ $('#modal-settings').classList.remove('open'); }

/* ============================================================
   START
   ============================================================ */
applyBrand();
</script>
</body>
</html>
